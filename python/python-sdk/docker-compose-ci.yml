services:
  postgres:
    image: postgres:14.13
    container_name: python-sdk-test-postgres
    environment:
      POSTGRES_DB: kestra_unit
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kestra -d kestra_unit" ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  kestra:
    container_name: python-sdk-test-kestra
    image: "europe-west1-docker.pkg.dev/kestra-host/docker/kestra-ee:${KESTRA_VERSION:-develop}-no-plugins"
    pull_policy: always
    user: "root"
    command: server standalone
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsv http://localhost:8081/health" ]
      interval: 2s
      timeout: 30s
      retries: 30
      start_period: 5s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../test-utils/docker-setup/application.yml:/app/confs/application.yml:ro
      - ../../test-utils/docker-setup/application-secrets.yml:/app/secrets/application-secrets.yml:ro
      - ./application-postgres.yml:/app/confs/application-postgres.yml:ro
      - ./kestra-logs:/kestra-logs
    environment:
      MICRONAUT_CONFIG_FILES: /app/confs/application.yml,/app/confs/application-postgres.yml,/app/secrets/application-secrets.yml
      # The container OOMs mid-suite (regression on the 2.0 develop image). A full
      # heap dump is multi-GB and unusable on a laptop, and dropping the heap low
      # enough to shrink it (1g) stops the OOM from triggering at all. Instead,
      # write unified GC logs to the bind mount: small text that shows heap
      # occupancy after every GC and each Full GC, so the leak's shape and onset
      # are visible. run-tests.sh additionally polls a per-class histogram from the
      # host. Keep 4g so the OOM still reproduces.
      JAVA_OPTS: "-Xms512m -Xmx4g -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Xlog:gc*:file=/kestra-logs/gc.log:time,uptime,level,tags"
    ports:
      - "9902:8080"
