services:
  kestra:
    container_name: python-sdk-test-kestra
    image: "europe-west1-docker.pkg.dev/kestra-host/docker/kestra-ee:develop-no-plugins"
    pull_policy: always
    user: "root"
    command: server standalone
    mem_limit: 3g
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsv http://localhost:8081/health" ]
      interval: 2s
      timeout: 30s
      retries: 30
      start_period: 5s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../test-utils/docker-setup/application.yml:/app/confs/application.yml:ro
      - ../../test-utils/docker-setup/application-secrets.yml:/app/secrets/application-secrets.yml:ro
    environment:
      MICRONAUT_CONFIG_FILES: /app/confs/application.yml,/app/secrets/application-secrets.yml
      JAVA_OPTS: "-Xms512m -Xmx2g -XX:MaxMetaspaceSize=256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ExitOnOutOfMemoryError"
    ports:
      - "9902:8080"
