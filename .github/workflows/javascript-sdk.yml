name: Javascript SDK release

on:
  workflow_call:
    inputs:
      kestra_version:
        description: "Kestra version to test against"
        required: false
        type: string
        default: "develop"
    secrets:
      NPM_TOKEN:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      KESTRA_EE_UNIT_TEST_LICENSE_FILE:
        required: true
      KESTRA_EE_UNIT_TEST_LICENSE_LEGACY_FILE:
        required: true

  workflow_dispatch:
    inputs:
      skip-test:
        description: "Skip test"
        required: false
        type: string
        default: "false"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test Javascript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./javascript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12"
          registry-url: "https://registry.npmjs.org"

      - name: Generate SDK
        working-directory: .
        run: |
          ./generate-sdks.sh ${{ inputs.kestra_version }} javascript

      - name: fail workflow if there is any difference after SDK generation
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "There are uncommitted changes after SDK generation. Please commit the changes."
            git --no-pager diff
            exit 1
          else
            echo "No changes detected after SDK generation."
          fi

      - name: GCP - Auth with github service account
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: configure docker access to GCP registry for EE image
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: type check
        run: npm run test:typecheck

      - name: extract docker version
        id: extract_version
        run: |
          # remove the .X or .x at the end of the version
          docker_version=$(echo "${{ inputs.kestra_version }}" | sed 's/\.[xX]$//')
          echo "docker_version=$docker_version" >> $GITHUB_OUTPUT

      - name: Select license file
        id: license
        uses: ./.github/actions/set-license-file
        with:
          kestra_version: ${{ steps.extract_version.outputs.docker_version }}
          license_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_FILE }}
          license_legacy_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_LEGACY_FILE }}

      - name: Test with vitest
        if: inputs.skip-test != 'true'
        env:
          KESTRA_VERSION: ${{ steps.extract_version.outputs.docker_version }}
        run: |
          echo "${{ steps.license.outputs.license }}" | base64 -d > ../test-utils/docker-setup/application-secrets.yml
          sh run-tests.sh $KESTRA_VERSION --no-build

  publish:
    name: Publish to Npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/heads/releases/') || github.ref ==
      'refs/heads/main'
    defaults:
      run:
        working-directory: ./javascript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.12"
          registry-url: "https://registry.npmjs.org"

      - name: extract current version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./javascript-sdk/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compute content hash
        id: resolveVersion
        run: |
          if [[ "${GITHUB_REF_NAME}" == releases/* ]]; then
            echo "kestra_version=${{inputs.kestra_version}}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_BASE_REF}" == releases/* ]]; then
            echo "kestra_version=${{inputs.kestra_version}}" >> $GITHUB_OUTPUT
          else
            HASH_SPEC=$(cat kestra-ee.yml | sha256sum | head -c 8)
            HASH_CODE=$(find javascript/javascript-sdk -type f | sort | xargs cat | sha256sum | head -c 8)
            echo "hash_spec=$HASH_SPEC" >> $GITHUB_OUTPUT
            echo "hash_code=$HASH_CODE" >> $GITHUB_OUTPUT
            echo "kestra_version=2.0.0-develop.$HASH_SPEC.$HASH_CODE" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm install

      - name: build
        run: npm run build

      # Trusted publishing need npm 11.+
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          npm version

      - name: Get OIDC Token
        env:
          AUDIENCE: "npm:registry.npmjs.org"
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$TOKEN_JSON"
          echo "NODE_AUTH_TOKEN=$ID_TOKEN" >> "$GITHUB_ENV"
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r

      - name: Check if version already published
        id: check
        working-directory: ./javascript
        run: |
          if npm show @kestra-io/kestra-sdk@${{ steps.resolveVersion.outputs.kestra_version }} version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.resolveVersion.outputs.kestra_version }} already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate SDK
        if: steps.check.outputs.skip != 'true'
        run: ./generate-sdks.sh ${{ steps.resolveVersion.outputs.kestra_version }}
          javascript

      - name: Publish to npm with develop tag
        if: steps.check.outputs.skip != 'true' && github.ref == 'refs/heads/main'
        working-directory: ./javascript/javascript-sdk
        run: npm publish --tag develop --access public

      - name: Update the version with the next available patch version
        if: steps.check.outputs.skip != 'true' && github.ref != 'refs/heads/main'
        working-directory: ./javascript/javascript-sdk
        run: |
          # create the version prefix by removing the last part of the version (e.g., 1.2.3 -> 1.2)
          VERSION_PREFIX=$(echo "${{ steps.resolveVersion.outputs.kestra_version }}" | awk -F. '{OFS="."; NF--; print}')

          # list all versions and filter those that start with the current version prefix (e.g., 1.2.) to find existing patch versions
          VERSIONS=$(npm view @kestra-io/kestra-sdk versions --json | jq -r '.[]' | grep "^${{ steps.resolveVersion.outputs.kestra_version }}")

          # get the highest patch version
          HIGHEST_PATCH=$(echo "$VERSIONS" | awk -F. '{print $NF}' | sort -nr | head -n 1)

          # increment the patch version
          NEXT_PATCH=$((HIGHEST_PATCH + 1))
          NEXT_VERSION="${{ steps.resolveVersion.outputs.kestra_version }}.$NEXT_PATCH"

          # set it right in package.json without creating a git tag
          npm version $NEXT_VERSION --no-git-tag-version

          # set it right in the README.md "Package version: v1.2.x" to "Package version: v1.2.2"
          sed -i "s/Package version: v[0-9]\+\.[0-9]\+\.X/Package version: v$NEXT_VERSION/g" README.md

          # Set it right in the src/ApiClient.js 'User-Agent': 'OpenAPI-Generator/v1.2.x/Javascript' to 'User-Agent': 'OpenAPI-Generator/v1.2.2/Javascript'
          sed -i "s/OpenAPI-Generator\/v[0-9]\+\.[0-9]\+\.X/OpenAPI-Generator\/v$NEXT_VERSION/g" src/ApiClient.js

          # Re-run the build to update the generated code with the new version
          npm run build

      - name: Publish to npm with latest tag
        if: steps.check.outputs.skip != 'true' && github.ref != 'refs/heads/main'
        working-directory: ./javascript/javascript-sdk
        # run: npm publish --access public
        run: |
          echo "npm publish --access public ${NEXT_VERSION}"
          cat package.json
          cat README.md
          cat src/ApiClient.js

      - name: Comment on commit with install instructions
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="$(cat <<'EOF'
          ### 📦 JavaScript SDK published

          Install this build with:
          ```sh
          npm install @kestra-io/kestra-sdk@${{ steps.resolveVersion.outputs.kestra_version }}
          ```
          EOF
          )"
