name: Javascript SDK release

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      KESTRA_EE_UNIT_TEST_LICENSE_FILE:
        required: false

  workflow_dispatch:
    inputs:
      skip-test:
        description: 'Skip test'
        required: false
        type: string
        default: "false"

  push:
    tags:
      - 'v*.*.*-javascript'

permissions:
  contents: read
  id-token: write


jobs:
  list-compatible-kestra-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.list_versions.outputs.versions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build matrix from compatible versions
        id: list_versions
        run: |
          versions=$(awk 'NF { gsub(/^[[:space:]]+|[[:space:]]+$/, ""); printf "%s\"%s\"", sep, $0; sep="," } END { print "" }' COMPATIBLE_KESTRA_VERSION.properties)
          echo "versions=[${versions}]" >> "$GITHUB_OUTPUT"

  test:
    name: Test Javascript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./javascript
    needs: list-compatible-kestra-versions
    strategy:
      fail-fast: false
      matrix:
        kestra_version: ${{ fromJSON(needs.list-compatible-kestra-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
          registry-url: 'https://registry.npmjs.org'

      - name: extract current version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./javascript-sdk/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

#      - name: Generate SDK
#        working-directory: .
#        run: ./generate-sdks.sh ${{ steps.extract_version.outputs.version }} javascript
#
#      - name: fail workflow if there is any difference after SDK generation
#        run: |
#          if [[ -n $(git status --porcelain) ]]; then
#            echo "There are uncommitted changes after SDK generation. Please commit the changes."
#            git --no-pager diff
#            exit 1
#          else
#            echo "No changes detected after SDK generation."
#          fi

      - name: Install dependencies
        run: npm install

      - name: build
        run: npm run build

      - name: GCP - Auth with github service account
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: configure docker access to GCP registry for EE image
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: type check
        run: npm run test:typecheck

      - name: Test with vitest
        if: inputs.skip-test != 'true'
        env:
          KESTRA_VERSION: ${{ matrix.kestra_version }}
        run: |
          echo "${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_FILE }}" | base64 -d > ../test-utils/docker-setup/application-secrets.yml
          sh run-tests.sh $KESTRA_VERSION

  publish:
    name: Publish to Npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-javascript')
    defaults:
      run:
        working-directory: ./javascript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.12'
          registry-url: 'https://registry.npmjs.org'

      - name: extract current version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./javascript-sdk/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: build
        run: npm run build

      # Trusted publishing need npm 11.+
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          npm version

      - name: Get OIDC Token
        env:
          AUDIENCE: "npm:registry.npmjs.org"
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$TOKEN_JSON"
          echo "NODE_AUTH_TOKEN=$ID_TOKEN" >> "$GITHUB_ENV"
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r

      - name: Transfer the version from the tag to the package.json
        working-directory: ./javascript/javascript-sdk
        run: |
          # Extract version from tag. example of tag refs/tags/v1.2.3-javascript
          RIGHT_REF=${GITHUB_REF#refs/tags/v}
          VERSION=${RIGHT_REF%-javascript}
          echo "Updating package.json to version $VERSION"
          # set version in package.json without creating a git tag since it already exists
          npm version $VERSION --no-git-tag-version --allow-same-version
          cat package.json

      - name: Publish to npm
        working-directory: ./javascript/javascript-sdk
        run: npm publish --access public --force
