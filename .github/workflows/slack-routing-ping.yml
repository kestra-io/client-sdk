name: Slack routing ping (TEMPORARY)

# Throwaway workflow to verify that the org slack-status composite routes to
# #_int_alert-plugins-build (C09FE0QCN2E) via the org SLACK_WEBHOOK_URL secret.
# DELETE this file before merging PR #293 — it exists only to confirm routing.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    name: Slack routing ping
    runs-on: ubuntu-latest
    steps:
      - name: Post test ping
        if: always()
        uses: kestra-io/actions/composite/slack-status@main
        with:
          channel: "C09FE0QCN2E" # #_int_alert-plugins-build
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          suffix: routing test — please ignore
          extra-text: "verifying #_int_alert-plugins-build routing for PR #293; safe to ignore"
