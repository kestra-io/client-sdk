name: Python SDK tests

on:
  push:
    branches:
      - main
      - "releases/v*"
    paths:
      - 'python/**'
  pull_request:
    branches:
      - main
      - "releases/v*"
    paths:
      - 'python/**'
  workflow_dispatch:
    inputs:
      skip-test:
        description: "Skip test"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "false"

jobs:
  test:
    name: Test Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python/python-sdk
    steps:
      - uses: actions/checkout@v5

      - name: Compute Kestra version
        id: version
        uses: ./.github/actions/compute-version

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.23"

      - name: Install pypa/build
        run: python -m pip install build --user

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install tests deps
        run: pip install -r test-requirements.txt

      - name: GCP - Auth with github service account
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: configure docker access to GCP registry for EE image
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Select license file
        id: license
        uses: ./.github/actions/set-license-file
        with:
          kestra_version: ${{ steps.version.outputs.kestra_version }}
          license_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_FILE }}
          license_legacy_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_LEGACY_FILE }}

      - name: Test with pytest
        if: inputs.skip-test != 'true'
        env:
          KESTRA_VERSION: ${{ steps.version.outputs.kestra_version }}
        run: |
          echo "${{ steps.license.outputs.license }}" | base64 -d > ../../test-utils/docker-setup/application-secrets.yml
          sh run-tests.sh $KESTRA_VERSION
