name: Python SDK tests

on:
  push:
    branches:
      - main
      - "releases/v*"
    paths:
      - 'python/**'
  pull_request:
    branches:
      - main
      - "releases/v*"
    paths:
      - 'python/**'
  workflow_dispatch:
    inputs:
      skip-test:
        description: "Skip test"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "false"

jobs:
  test:
    name: Test Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python/python-sdk
    steps:
      - uses: actions/checkout@v5

      - name: Compute Kestra version
        id: version
        uses: ./.github/actions/compute-version

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.23"

      # Static doc checks — no Kestra container needed, so they fail fast.
      - name: Check README examples are in sync with their tested source
        run: python3 ../../test-utils/embed_snippets.py --check ../../README_PYTHON_SDK.md

      - name: Validate generated docs examples match the SDK
        run: python3 scripts/validate_doc_examples.py --check

      - name: Install pypa/build
        run: python -m pip install build --user

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Install tests deps
        run: pip install -r test-requirements.txt

      - name: GCP - Auth with github service account
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: configure docker access to GCP registry for EE image
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Select license file
        id: license
        uses: ./.github/actions/set-license-file
        with:
          kestra_version: ${{ steps.version.outputs.kestra_version }}
          license_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_FILE }}
          license_legacy_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_LEGACY_FILE }}

      - name: Test with pytest
        if: inputs.skip-test != 'true'
        env:
          KESTRA_VERSION: ${{ steps.version.outputs.kestra_version }}
        run: |
          echo "${{ steps.license.outputs.license }}" | base64 -d > ../../test-utils/docker-setup/application-secrets.yml
          bash run-tests.sh $KESTRA_VERSION

      # The CI Kestra container dies with a Java heap OutOfMemoryError mid-run
      # (regression on the 2.0 develop image). Instead of a multi-GB heap dump,
      # upload small text diagnostics: the unified GC log (heap occupancy + Full GC
      # events) and per-class histogram snapshots polled from the host, the last of
      # which (before the OOM) shows the accumulating classes.
      - name: Upload Kestra logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kestra-logs
          path: python/python-sdk/kestra-logs/
          if-no-files-found: ignore
          retention-days: 5

      # Slack - alert CI failures on push/dispatch (not PRs) to the build channel
      - name: Slack - Notify CI failure
        if: failure() && github.event_name != 'pull_request'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          job_name: Python SDK CI
          fields: repo,commit,ref,took
          username: GitHub Actions
          icon_emoji: ':github-actions:'
          channel: 'C09FE0QCN2E'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
