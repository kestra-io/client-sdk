name: Javascript SDK develop publish

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm (develop tag)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get OIDC Token
        env:
          AUDIENCE: "npm:registry.npmjs.org"
        run: |
          TOKEN_JSON=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          ID_TOKEN=$(echo "$TOKEN_JSON" | jq -r .value)
          echo "$TOKEN_JSON"
          echo "NODE_AUTH_TOKEN=$ID_TOKEN" >> "$GITHUB_ENV"
          echo "$ID_TOKEN" | awk -F. '{print $2}' | base64 -d 2>/dev/null | jq -r

      - uses: actions/setup-node@v6
        with:
          node-version-file: javascript/.nvmrc

      # Trusted publishing need npm 11.+
      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          npm version

      - name: Compute content hash
        id: hash
        run: |
          HASH_SPEC=$(cat kestra-ee.yml | sha256sum | head -c 8)
          HASH_CODE=$(find javascript/javascript-sdk -type f | sort | xargs cat | sha256sum | head -c 8)
          echo "hash_spec=$HASH_SPEC" >> $GITHUB_OUTPUT
          echo "hash_code=$HASH_CODE" >> $GITHUB_OUTPUT
          echo "version=2.0.0-develop.$HASH_SPEC.$HASH_CODE" >> $GITHUB_OUTPUT

      - name: Check if version already published
        id: check
        working-directory: ./javascript
        run: |
          if npm show @kestra-io/kestra-sdk@${{ steps.hash.outputs.version }} version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.hash.outputs.version }} already published — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate SDK
        if: steps.check.outputs.skip != 'true'
        run: ./generate-sdks.sh ${{ steps.hash.outputs.version }} javascript

      - name: Publish to npm with develop tag
        if: steps.check.outputs.skip != 'true'
        working-directory: ./javascript/javascript-sdk
        # run: npm publish --tag develop --access public
        run: echo "npm publish --tag develop --access public"

      - name: Comment on commit with install instructions
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
            -f body="### 📦 JavaScript SDK published

          Install this build with:
          \`\`\`sh
          npm install @kestra-io/kestra-sdk@${{ steps.hash.outputs.version }}
          \`\`\`
