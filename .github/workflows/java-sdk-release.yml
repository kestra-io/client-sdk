name: Java SDK release

# Tag-only release, aligned with terraform-provider-kestra / kestractl.
# Push a tag like `v1.0.13-java` to publish that version to Maven Central. The
# tag is cut from an already-green release branch, so this workflow only builds
# and publishes — tests run on push/PR via java-sdk.yml.
on:
  push:
    tags:
      - "v*-java"

jobs:
  publish:
    name: Publish Java SDK
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
    defaults:
      run:
        working-directory: ./java/java-sdk
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from tag
        id: version
        run: |
          # v1.0.13-java -> 1.0.13
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION%-java}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Caches
      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
            '**/gradle*.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # JDK
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Publish
      - name: Publish - Release package to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USER }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_GPG_KEYID: ${{ secrets.SONATYPE_GPG_KEYID }}
          SONATYPE_GPG_PASSWORD: ${{ secrets.SONATYPE_GPG_PASSWORD }}
          SONATYPE_GPG_FILE: ${{ secrets.SONATYPE_GPG_FILE}}
        run: |
          mkdir -p ~/.gradle/
          echo "signing.keyId=${SONATYPE_GPG_KEYID}" > ~/.gradle/gradle.properties
          echo "signing.password=${SONATYPE_GPG_PASSWORD}" >> ~/.gradle/gradle.properties
          echo "signing.secretKeyRingFile=${HOME}/.gradle/secring.gpg" >> ~/.gradle/gradle.properties
          echo ${SONATYPE_GPG_FILE} | base64 -d > ~/.gradle/secring.gpg
          ./gradlew publishToMavenCentral -Pversion=${{ steps.version.outputs.version }}

      # GitHub Release
      - name: Create GitHub release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          files: |
            build/libs/*.jar

      # Slack - announce a successful release to the releases channel
      - name: Slack notification
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: success
          job_name: Publish
          text: 'Release ${{ github.ref_name }}'
          fields: repo,commit,action,ref,job,took
          username: GitHub Actions
          icon_emoji: ":github-actions:"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}

      # Slack - send release failures to the build alert channel
      - name: Slack - Notify release failure
        uses: 8398a7/action-slack@v3
        if: failure()
        with:
          status: failure
          job_name: Publish
          text: 'Release ${{ github.ref_name }} failed.'
          fields: repo,commit,ref,took
          username: GitHub Actions
          icon_emoji: ":github-actions:"
          channel: 'C09FE0QCN2E'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
