name: Java SDK release

# Tag-only release, aligned with terraform-provider-kestra / kestractl.
# Push a tag like `v1.0.13-java` to publish that version to Maven Central. The
# tag is cut from an already-green release branch, so this workflow only builds
# and publishes — tests run on push/PR via java-sdk.yml.
on:
  push:
    tags:
      - "v*-java"

jobs:
  publish:
    name: Publish Java SDK
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
    defaults:
      run:
        working-directory: ./java/java-sdk
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version from tag
        id: version
        run: |
          # v1.0.13-java -> 1.0.13
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION%-java}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Caches
      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
            '**/gradle*.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # JDK
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Publish
      - name: Publish - Release package to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USER }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_GPG_KEYID: ${{ secrets.SONATYPE_GPG_KEYID }}
          SONATYPE_GPG_PASSWORD: ${{ secrets.SONATYPE_GPG_PASSWORD }}
          SONATYPE_GPG_FILE: ${{ secrets.SONATYPE_GPG_FILE}}
        run: |
          mkdir -p ~/.gradle/
          echo "signing.keyId=${SONATYPE_GPG_KEYID}" > ~/.gradle/gradle.properties
          echo "signing.password=${SONATYPE_GPG_PASSWORD}" >> ~/.gradle/gradle.properties
          echo "signing.secretKeyRingFile=${HOME}/.gradle/secring.gpg" >> ~/.gradle/gradle.properties
          echo ${SONATYPE_GPG_FILE} | base64 -d > ~/.gradle/secring.gpg
          ./gradlew publishToMavenCentral -Pversion=${{ steps.version.outputs.version }}

      # GitHub Release
      - name: Create GitHub release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          files: |
            build/libs/*.jar

      # Slack
      # Uses the org-standard composite (kestra-io/actions/composite/slack-status)
      # so the channel override routes correctly: it embeds `channel` inside the
      # Slack payload, which the org SLACK_WEBHOOK_URL webhook honours. The old
      # 8398a7/action-slack `channel` input never reached the payload, so the
      # message fell back to the webhook's default DM destination.
      - name: Slack notification
        uses: kestra-io/actions/composite/slack-status@main
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        with:
          channel: "C02DQ1A7JLR"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          suffix: ${{ steps.version.outputs.version }}
          users-map: ${{ vars.GITHUB_TO_SLACK_MAP }}
