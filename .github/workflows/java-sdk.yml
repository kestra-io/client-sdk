name: Java SDK tests

on:
  push:
    branches:
      - main
      - "releases/v*"
    paths:
      - 'java/**'
  pull_request:
    branches:
      - main
      - "releases/v*"
    paths:
      - 'java/**'
  workflow_dispatch:
    inputs:
      skip-test:
        description: "Skip test"
        required: false
        type: choice
        options:
          - "true"
          - "false"
        default: "false"

jobs:
  test:
    name: Test Java SDK
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
    defaults:
      run:
        working-directory: ./java/java-sdk
    steps:
      - uses: actions/checkout@v7

      - name: Compute Kestra version
        id: version
        uses: ./.github/actions/compute-version

      # Caches
      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*',
            '**/gradle*.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # JDK
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Static doc check — runs the JDK single-file tool (no Kestra container
      # needed, so it fails fast). Guarantees the README usage snippet is
      # identical to the CI-tested example (BasicSDKUsageExample.java). #144.
      - name: Check README example is in sync with its tested source
        run: java ../../test-utils/EmbedSnippets.java --check ../../README.md

      # Gradle check
      - name: Build with Gradle
        if: inputs.skip-test != 'true'
        run: ./gradlew check

      - name: GCP - Auth with github service account
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: configure docker access to GCP registry for EE image
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Select license file
        id: license
        uses: ./.github/actions/set-license-file
        with:
          kestra_version: ${{ steps.version.outputs.kestra_version }}
          license_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_FILE }}
          license_legacy_file: ${{ secrets.KESTRA_EE_UNIT_TEST_LICENSE_LEGACY_FILE }}

      - name: Build local SDK and test it in an example project
        if: inputs.skip-test != 'true'
        env:
          KESTRA_VERSION: ${{ steps.version.outputs.kestra_version }}
        run: |
          echo "${{ steps.license.outputs.license }}" | base64 -d > ../../test-utils/docker-setup/application-secrets.yml
          sh run-tests.sh $KESTRA_VERSION

      - name: Test - Publish Test Results
        uses: dorny/test-reporter@v2
        if: inputs.skip-test != 'true'
        with:
          name: Java Tests Report (${{ steps.version.outputs.kestra_version }})
          reporter: java-junit
          path: "**/build/test-results/test/TEST-*.xml"
          list-suites: "all"
          list-tests: "all"
          fail-on-error: "false"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack - Notify CI failure
        if: failure() && github.event_name != 'pull_request'
        uses: kestra-io/actions/composite/slack-status@main
        with:
          channel: 'C09FE0QCN2E'
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          users-map: ${{ vars.GITHUB_TO_SLACK_MAP }}
          suffix: Java SDK
